<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banknote Authentication</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Banknote Authentication</h1>
            <p class="subtitle">Enter the features to verify if a banknote is legitimate or fake</p>
            
            <form id="predictForm">
                <div class="form-group">
                    <label for="variance">Variance</label>
                    <input type="number" id="variance" name="variance" step="any" required placeholder="Enter variance">
                </div>
                
                <div class="form-group">
                    <label for="skewness">Skewness</label>
                    <input type="number" id="skewness" name="skewness" step="any" required placeholder="Enter skewness">
                </div>
                
                <div class="form-group">
                    <label for="curtosis">Curtosis</label>
                    <input type="number" id="curtosis" name="curtosis" step="any" required placeholder="Enter curtosis">
                </div>
                
                <div class="form-group">
                    <label for="entropy">Entropy</label>
                    <input type="number" id="entropy" name="entropy" step="any" required placeholder="Enter entropy">
                </div>
                
                <button type="submit" id="predictBtn">Authenticate</button>
            </form>
            
            <div id="result" class="result hidden">
                <h2>Result</h2>
                <div id="prediction" class="prediction"></div>
                <div id="probability" class="probability"></div>
            </div>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Authenticating...</p>
            </div>
        </div>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
